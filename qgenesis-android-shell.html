<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QGenesis AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #7de3c8;
    }

    header .badge {
      font-size: 0.7rem;
      background: #1a3a30;
      color: #7de3c8;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #2e6655;
    }

    #status-bar {
      font-size: 0.72rem;
      padding: 5px 20px;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      color: #666;
      min-height: 24px;
    }

    #status-bar span { color: #7de3c8; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a3a30;
      border: 1px solid #2e6655;
      color: #d4f5ea;
    }

    .msg.ai {
      align-self: flex-start;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
    }

    .msg.ai .provider-tag {
      font-size: 0.65rem;
      color: #7de3c8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .msg.error {
      align-self: flex-start;
      background: #2a1010;
      border: 1px solid #5a2020;
      color: #f87171;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      color: #555;
      font-size: 0.78rem;
      font-style: italic;
    }

    .typing-indicator {
      align-self: flex-start;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      padding: 12px 18px;
      border-radius: 14px;
      display: none;
    }

    .typing-indicator span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #7de3c8;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #161616;
      border-top: 1px solid #2a2a2a;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e8e8e8;
      padding: 10px 14px;
      font-size: 0.92rem;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #prompt:focus { border-color: #7de3c8; }

    #send-btn {
      background: #7de3c8;
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #9aecd8; }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled { background: #2a4a40; color: #7de3c8; cursor: not-allowed; }

    #options {
      display: flex;
      gap: 10px;
      padding: 0 20px 10px;
      background: #161616;
      flex-wrap: wrap;
    }

    #options label { font-size: 0.78rem; color: #888; }

    #options select {
      background: #111;
      color: #ccc;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ QGenesis AI</h1>
  <span class="badge">Cloud Live</span>
</header>

<div id="status-bar">Connecting…</div>

<div id="messages">
  <div class="msg system">QGenesis AI is ready. Ask me anything.</div>
</div>

<div class="typing-indicator" id="typing">
  <span></span><span></span><span></span>
</div>

<div id="options">
  <label>Primary: <select id="primary"><option value="gemini">Gemini</option><option value="perplexity">Perplexity</option></select></label>
  <label>Fallback: <select id="fallback"><option value="perplexity">Perplexity</option><option value="gemini">Gemini</option></select></label>
</div>

<div id="input-area">
  <textarea id="prompt" placeholder="Ask QGenesis AI…" rows="1"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const typingEl   = document.getElementById('typing');
  const promptEl   = document.getElementById('prompt');
  const sendBtn    = document.getElementById('send-btn');
  const statusBar  = document.getElementById('status-bar');

  function addMsg(role, text, provider) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'ai' && provider) {
      const tag = document.createElement('div');
      tag.className = 'provider-tag';
      tag.textContent = '▸ ' + provider;
      div.appendChild(tag);
    }
    const content = document.createElement('span');
    content.textContent = text;
    div.appendChild(content);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      const providers = [];
      if (d.providers?.gemini) providers.push('Gemini ✓');
      if (d.providers?.perplexity) providers.push('Perplexity ✓');
      statusBar.innerHTML = providers.length
        ? 'Online — providers: <span>' + providers.join(', ') + '</span>'
        : 'Online — <span>no API keys configured</span>';
    } catch {
      statusBar.textContent = 'Could not reach server.';
    }
  }

  async function sendPrompt() {
    const text = promptEl.value.trim();
    if (!text) return;
    promptEl.value = '';
    promptEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;

    const primary  = document.getElementById('primary').value;
    const fallback = document.getElementById('fallback').value;

    try {
      const res = await fetch('/api/chat/route', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, primary, fallback })
      });
      const data = await res.json();
      typingEl.style.display = 'none';
      if (data.ok) {
        const label = data.provider + (data.fallback_used ? ' (fallback)' : '');
        addMsg('ai', data.text, label);
      } else {
        addMsg('error', 'Error: ' + (data.text || data.detail || 'Unknown error'));
      }
    } catch (err) {
      typingEl.style.display = 'none';
      addMsg('error', 'Network error: ' + err.message);
    }

    sendBtn.disabled = false;
    promptEl.focus();
  }

  sendBtn.addEventListener('click', sendPrompt);
  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
  });
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
  });

  fetchStatus();
</script>
</body>
</html>
